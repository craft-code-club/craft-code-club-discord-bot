name: Docker Build Test


on:
  workflow_dispatch:

  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

env:
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}/cicd-test-build-image:validation-${{ github.run_number }}


jobs:
  test-docker-build:
    name: Test Docker Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.3
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image was created
        run: |
          docker images
          if ! docker images --format "{{.Repository}}:{{.Tag}}" | grep -q "${{ env.IMAGE_NAME }}"; then
            echo "Error: Docker image was not created successfully"
            exit 1
          fi
          echo "Docker image verified successfully"
